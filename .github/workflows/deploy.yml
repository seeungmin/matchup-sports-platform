name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'DANGER: Drop all tables, re-run migrations, re-seed'
        required: false
        default: false
        type: boolean
      run_seed:
        description: 'DANGER: Run destructive full seed data refresh'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Test job: runs on every push and PR ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teameet_test
          POSTGRES_PASSWORD: teameet_test
          POSTGRES_DB: teameet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teameet_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://teameet_test:teameet_test@localhost:5432/teameet_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm prisma generate

      - name: Generate V1 Prisma client
        run: cd apps/v1_api && pnpm prisma generate

      - name: Lint (all packages)
        run: pnpm lint

      - name: Type-check (parallel)
        run: |
          (cd apps/api && npx tsc --noEmit) & pid1=$!
          (cd apps/web && npx tsc --noEmit) & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      - name: Unit tests (parallel)
        run: |
          pnpm --filter api test & pid1=$!
          pnpm --filter web test & pid2=$!
          pnpm --filter v1_api test & pid3=$!
          pnpm --filter v1_web test & pid4=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1
          wait $pid3 || exit 1
          wait $pid4 || exit 1

      - name: V1 build checks (parallel)
        run: |
          pnpm --filter v1_api build & pid1=$!
          pnpm --filter v1_web build & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      - name: Prisma DB push (integration test schema)
        run: cd apps/api && pnpm prisma db push

      - name: Integration tests
        run: pnpm --filter api test:integration

  # ── Deploy job: runs on push to main or manual dispatch, after tests pass ──
  deploy:
    name: Deploy
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ec2-user
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Sync code
        run: |
          rsync -avz --delete \
            --exclude node_modules --exclude .next --exclude dist --exclude .git --exclude 'deploy/certbot' \
            --filter 'protect deploy/.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:~/teameet/

      - name: Build and deploy
        timeout-minutes: 35
        env:
          RESET_DB: ${{ inputs.reset_db }}
          RUN_SEED: ${{ inputs.run_seed }}
          TOSS_CLIENT_KEY_SECRET: ${{ secrets.TOSS_CLIENT_KEY }}
          TOSS_SECRET_KEY_SECRET: ${{ secrets.TOSS_SECRET_KEY }}
          TOSS_WEBHOOK_SECRET_SECRET: ${{ secrets.TOSS_WEBHOOK_SECRET }}
          VAPID_PUBLIC_KEY_SECRET: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY_SECRET: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT_SECRET: ${{ secrets.VAPID_SUBJECT }}
          OPS_ALERT_WEBHOOK_URL_SECRET: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
        run: |
          TOSS_CLIENT_KEY_B64="$(printf '%s' "${TOSS_CLIENT_KEY_SECRET:-}" | base64 | tr -d '\n')"
          TOSS_SECRET_KEY_B64="$(printf '%s' "${TOSS_SECRET_KEY_SECRET:-}" | base64 | tr -d '\n')"
          TOSS_WEBHOOK_SECRET_B64="$(printf '%s' "${TOSS_WEBHOOK_SECRET_SECRET:-}" | base64 | tr -d '\n')"
          VAPID_PUBLIC_KEY_B64="$(printf '%s' "${VAPID_PUBLIC_KEY_SECRET:-}" | base64 | tr -d '\n')"
          VAPID_PRIVATE_KEY_B64="$(printf '%s' "${VAPID_PRIVATE_KEY_SECRET:-}" | base64 | tr -d '\n')"
          VAPID_SUBJECT_B64="$(printf '%s' "${VAPID_SUBJECT_SECRET:-}" | base64 | tr -d '\n')"
          OPS_ALERT_WEBHOOK_URL_B64="$(printf '%s' "${OPS_ALERT_WEBHOOK_URL_SECRET:-}" | base64 | tr -d '\n')"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 "RESET_DB='${RESET_DB:-}' RUN_SEED='${RUN_SEED:-}' TOSS_CLIENT_KEY_B64='${TOSS_CLIENT_KEY_B64}' TOSS_SECRET_KEY_B64='${TOSS_SECRET_KEY_B64}' TOSS_WEBHOOK_SECRET_B64='${TOSS_WEBHOOK_SECRET_B64}' VAPID_PUBLIC_KEY_B64='${VAPID_PUBLIC_KEY_B64}' VAPID_PRIVATE_KEY_B64='${VAPID_PRIVATE_KEY_B64}' VAPID_SUBJECT_B64='${VAPID_SUBJECT_B64}' OPS_ALERT_WEBHOOK_URL_B64='${OPS_ALERT_WEBHOOK_URL_B64}' bash -se" <<'EOF'
          set -euo pipefail

          RESET_DB="${RESET_DB:-false}"
          RUN_SEED="${RUN_SEED:-false}"

          cd ~/teameet

          sync_env_from_github_secret() {
            local key="$1"
            local b64_value="$2"
            local decoded_value=""
            local tmp_env

            if [ -n "$b64_value" ]; then
              decoded_value=$(printf '%s' "$b64_value" | base64 -d)
            fi

            tmp_env=$(mktemp)
            awk -v key="${key}=" 'index($0, key) != 1' deploy/.env > "$tmp_env"
            {
              cat "$tmp_env"
              printf '%s=%s\n' "$key" "$decoded_value"
            } > deploy/.env
            rm -f "$tmp_env"
          }

          if sudo docker compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker compose"
          elif sudo docker-compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker-compose"
          else
            echo "Docker Compose is not installed on the EC2 host"
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            sudo yum install -y jq 2>/dev/null || sudo apt-get install -y jq 2>/dev/null || {
              echo "[ERROR] jq is required for deploy health checks"
              exit 1
            }
          fi

          if [ ! -f deploy/.env ]; then
            echo "[ERROR] Missing deploy/.env on the EC2 host"
            exit 1
          fi

          sync_env_from_github_secret "TOSS_CLIENT_KEY" "${TOSS_CLIENT_KEY_B64:-}"
          sync_env_from_github_secret "TOSS_SECRET_KEY" "${TOSS_SECRET_KEY_B64:-}"
          sync_env_from_github_secret "TOSS_WEBHOOK_SECRET" "${TOSS_WEBHOOK_SECRET_B64:-}"
          sync_env_from_github_secret "VAPID_PUBLIC_KEY" "${VAPID_PUBLIC_KEY_B64:-}"
          sync_env_from_github_secret "VAPID_PRIVATE_KEY" "${VAPID_PRIVATE_KEY_B64:-}"
          sync_env_from_github_secret "VAPID_SUBJECT" "${VAPID_SUBJECT_B64:-}"
          sync_env_from_github_secret "OPS_ALERT_WEBHOOK_URL" "${OPS_ALERT_WEBHOOK_URL_B64:-}"

          # Harden deploy/.env perms against EC2 umask 022 — contains VAPID_PRIVATE_KEY and other secrets
          chmod 600 deploy/.env

          # Auto-set REALTIME_ALLOWED_ORIGINS if not already configured
          if ! grep -q '^REALTIME_ALLOWED_ORIGINS=.' deploy/.env 2>/dev/null; then
            _DEPLOY_PUBLIC_IP=$(curl -s --connect-timeout 3 http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || echo "")
            if [ -n "$_DEPLOY_PUBLIC_IP" ]; then
              tmp_env=$(mktemp)
              awk 'index($0, "REALTIME_ALLOWED_ORIGINS=") != 1' deploy/.env > "$tmp_env"
              printf 'REALTIME_ALLOWED_ORIGINS=http://%s,https://%s\n' "$_DEPLOY_PUBLIC_IP" "$_DEPLOY_PUBLIC_IP" >> "$tmp_env"
              mv "$tmp_env" deploy/.env
              echo "[INFO] Auto-set REALTIME_ALLOWED_ORIGINS for $_DEPLOY_PUBLIC_IP"
            fi
          fi

          set -a
          . deploy/.env
          set +a

          required_env_vars=(DB_PASSWORD JWT_SECRET)
          for required_env in "${required_env_vars[@]}"; do
            if [ -z "${!required_env:-}" ]; then
              echo "[ERROR] Missing required deploy env: ${required_env}"
              exit 1
            fi
          done

          WEB_INTERNAL_API_ORIGIN="${INTERNAL_API_ORIGIN:-http://api:8100}"
          V1_WEB_INTERNAL_API_ORIGIN="${V1_INTERNAL_API_ORIGIN:-http://v1_api:8121}"

          # ── Pre-build disk cleanup ────────────────────────────────────────
          # Prevent ERR_PNPM_ENOSPC during the docker build step by evicting
          # dangling images, stopped containers, and unused build cache.
          # Volumes are NOT touched (postgres/redis data must persist).
          echo "[cleanup] Disk usage before prune:"
          df -h / | tail -1
          # Use `docker image prune -f` (without -a) to remove only dangling images.
          # `-a` would delete ALL unused images including cached base layers (node:22-alpine,
          # postgres:16-alpine, etc.) forcing a full re-pull on every deploy.
          sudo docker image prune -f || true
          sudo docker container prune -f || true
          sudo docker builder prune -a -f || true
          sudo docker network prune -f || true
          echo "[cleanup] Disk usage after prune:"
          df -h / | tail -1

          sudo docker build --no-cache -f deploy/Dockerfile.api -t teameet-api .
          sudo docker build --no-cache \
            -f deploy/Dockerfile.web \
            --build-arg NEXT_PUBLIC_API_URL=/api/v1 \
            --build-arg NEXT_PUBLIC_TOSS_CLIENT_KEY="${TOSS_CLIENT_KEY:-}" \
            --build-arg INTERNAL_API_ORIGIN="${WEB_INTERNAL_API_ORIGIN}" \
            -t teameet-web .
          sudo docker build --no-cache -f deploy/Dockerfile.v1-api -t teameet-v1-api .
          sudo docker build --no-cache \
            -f deploy/Dockerfile.v1-web \
            --build-arg NEXT_PUBLIC_API_URL=/v1/api/v1 \
            --build-arg INTERNAL_API_ORIGIN="${V1_WEB_INTERNAL_API_ORIGIN}" \
            --build-arg NEXT_PUBLIC_BASE_PATH=/v1 \
            -t teameet-v1-web .

          cd deploy

          # ── Ensure postgres and redis are running before migrations ───────
          # network prune above may have removed the deploy_default network.
          # Start DB services first so the migration container can reach them.
          echo "[INFO] Starting database services..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env up -d postgres redis v1_postgres

          echo "[INFO] Waiting for postgres to be healthy..."
          for i in $(seq 1 30); do
            if ${COMPOSE} -f docker-compose.prod.yml --env-file .env exec -T postgres \
                pg_isready >/dev/null 2>&1; then
              echo "[INFO] postgres is ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "[ERROR] postgres did not become healthy in time"
              exit 1
            fi
            sleep 2
          done

          # ── Bootstrap or apply database migrations before new containers ──
          # Empty databases cannot replay the current migration chain from
          # scratch because the repo lacks an old baseline migration. In that
          # case we bootstrap the current schema with prisma db push and mark
          # the existing migrations as applied. Non-empty databases still use
          # migrate deploy, and a non-empty DB without migration history fails
          # closed instead of auto-resolving unknown drift.
          echo "[INFO] Waiting for v1_postgres to be healthy..."
          for i in $(seq 1 30); do
            if ${COMPOSE} -f docker-compose.prod.yml --env-file .env exec -T v1_postgres \
                pg_isready -U "${V1_DB_USER:-teameet_v1}" -d "${V1_DB_NAME:-teameet_v1}" >/dev/null 2>&1; then
              echo "[INFO] v1_postgres is ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "[ERROR] v1_postgres did not become healthy in time"
              exit 1
            fi
            sleep 2
          done

          echo "[INFO] Bootstrapping deploy database..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env \
            run --rm --no-deps -T api sh -c "cd /app/apps/api && ./node_modules/.bin/ts-node prisma/bootstrap-deploy-db.ts"
          echo "[INFO] Applying v1 deploy database migrations..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env \
            run --rm --no-deps -T v1_api sh -c "cd /app/apps/v1_api && ./node_modules/.bin/prisma migrate deploy"
          echo "[INFO] Build phase complete."
          EOF

      - name: Restart containers
        timeout-minutes: 15
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 \
            "RESET_DB='${{ inputs.reset_db }}' RUN_SEED='${{ inputs.run_seed }}' bash ~/teameet/deploy/restart-containers.sh"

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if ssh ec2 'curl -fsS http://localhost:8100/api/v1/health | \
                        jq -e ".data.checks.db == true and .data.checks.redis == true" > /dev/null 2>&1 && \
                        curl -fsS http://localhost:8121/api/v1/health | \
                        jq -e ".data.checks.db == true" > /dev/null 2>&1 && \
                        curl -fsS http://localhost/landing > /dev/null 2>&1 && \
                        curl -fsS http://localhost/v1/landing > /dev/null 2>&1 && \
                        curl -fsSI http://localhost/v1/api/v1/health | \
                        grep -qE "^HTTP/[0-9.]+ 301" && \
                        curl -fsSI http://localhost/api/v1/health | \
                        grep -qE "^HTTP/[0-9.]+ 301"'; then
              echo "Deploy OK"
              exit 0
            fi
            echo "Attempt $i/12 — not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Deploy FAILED"
          exit 1
