function SMNewVisibilityStyle({ mode }) {
  if (mode === 'all') return null;
  const ids =
    mode === 'complete'
      ? SM_FIRST_DESIGN_COMPLETE_SECTIONS
      : mode === 'complete-1-1'
      ? SM_FIRST_DESIGN_COMPLETE_1_1_SECTIONS
      : mode === 'progress'
      ? SM_FIRST_DESIGN_PROGRESS_SECTIONS
      : mode === 'core'
      ? SM_NEW_CORE_SECTIONS
      : mode === 'core-grid'
        ? [...SM_NEW_CORE_SECTIONS, ...SM_NEW_CORE_GRID_SECTIONS]
        : mode === 'candidate'
          ? SM_NEW_CANDIDATE_SECTIONS
          : mode === 'reference'
            ? SM_NEW_REFERENCE_SECTIONS
            : [];
  const selectors = ids.map((id) => `[data-dc-section="${id}"]`).join(',');
  return (
    <style>{`
      [data-dc-section]{display:none !important;}
      ${selectors}{display:block !important;}
    `}</style>
  );
}

    ['reviews-post-event-sm-final-14-3', '14 리뷰 최종'],
  ];
  const complete11 = [
    ['core-shell-sm-final-1-1', '00 SM 최종'],
    ['auth-onboarding-sm-final-1-1', '01 인증 최종'],
    ['home-discovery-sm-final-1-1', '02 홈 최종'],
    ['home-notice-sm-final-1-1', '02-1 공지 최종'],
    ['matches-core-sm-final-1-1', '03 매치 최종'],
    ['matches-core-sm-create-final-1-1', '03-1 매치 생성/수정 최종'],
    ['teams-team-matches-sm-revision-4-1-1', '04 팀매치 최종'],
    ['teams-team-matches-sm-create-final-1-1', '04-1 팀매치 생성/수정 최종'],
    ['team-browse-sm-revision-5-1-1', '05 팀 SM5 최종'],
    ['community-sm-final-1-1', '06 커뮤니티 최종'],
    ['my-profile-trust-sm-revision-1-1', '07 마이 SM1 최종'],
    ['payments-support-sm-revision-1-1', '08 결제 SM'],
    ['settings-states-1-1', '09 설정'],
    ['public-marketing-sm-revision-1-1', '10 공개 SM'],
    ['desktop-web-1-1', '11 데스크톱'],
    ['admin-ops-sm-revision-1-1', '12 관리자 SM'],
    ['common-flows-motion-1-1', '13 공통 플로우'],
    ['reviews-post-event-sm-final-1-1', '14 리뷰'],
  ];
  const grids = [
    ['m01-grid', 'M01 인증'],
    ['m02-grid', 'M02 홈'],
    ['m03-grid', 'M03 매치'],
    ['m04-grid', 'M04 팀'],
    ['m11-grid', 'M11 안전'],
    ['m08-grid', 'M08 용병'],
    ['m12-grid', 'M12 커뮤니티'],
    ['m13-grid', 'M13 마이'],
    ['m14-grid', 'M14 결제'],
    ['m18-grid', 'M18 관리자'],
    ['m19-grid', 'M19 공통'],
  ];
  const active = viewMode === 'complete-1-1'
    ? complete11
    : viewMode === 'complete'
    ? complete
    : viewMode === 'progress'
      ? progress
    : tab === 'reference'
      ? reference
      : tab === 'candidate'
        ? candidate
        : tab === 'grid'
          ? grids
          : core;

  const setModeAndJump = (mode, target) => {
    setViewMode(mode);
    setTimeout(() => onJump(target, mode === 'core' ? 0.82 : 0.72), 80);
  };

  const panelStyle = {
    position: 'fixed',
    top: 18,
    right: 18,
    zIndex: 2000,
    width: open ? 320 : 132,
    maxHeight: 'calc(100vh - 36px)',
    overflow: 'hidden',
    borderRadius: 14,
    border: '1px solid rgba(17,24,39,.12)',
    background: 'rgba(255,255,255,.94)',
    boxShadow: '0 12px 32px rgba(15,23,42,.14)',
    backdropFilter: 'blur(16px)',
    fontFamily: 'Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif',
    color: '#111827',
  };
  const buttonStyle = {
    height: 32,
    borderRadius: 8,
    border: '1px solid rgba(17,24,39,.1)',
    background: '#fff',
    color: '#374151',
    fontSize: 12,
    fontWeight: 700,
    cursor: 'pointer',
  };
  const tabStyle = (id) => ({
    ...buttonStyle,
    height: 30,
    background: tab === id ? '#3182f6' : '#f3f4f6',
    color: tab === id ? '#fff' : '#4b5563',
    borderColor: tab === id ? '#3182f6' : 'transparent',
  });

  return (
    <div style={panelStyle}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '12px 12px 10px' }}>
        <button onClick={() => setOpen(!open)} style={{ ...buttonStyle, width: open ? 86 : 106, background: '#111827', color: '#fff' }}>
          {open ? '패널 접기' : '보기 패널'}
        </button>
        {open && (
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={() => window.__dcSetScale?.(.55)} style={{ ...buttonStyle, width: 44 }}>55%</button>
            <button onClick={() => window.__dcSetScale?.(.85)} style={{ ...buttonStyle, width: 44 }}>85%</button>
            <button onClick={() => window.__dcResetView?.()} style={{ ...buttonStyle, width: 54 }}>리셋</button>
          </div>
        )}
      </div>

      {open && (
        <div style={{ padding: '0 12px 12px' }}>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 4 }}>SM New Direction</div>
          <div style={{ fontSize: 12, lineHeight: 1.5, color: '#6b7280', marginBottom: 10 }}>
            섹션 버튼으로 바로 이동합니다. 휠은 확대/축소, 트랙패드는 이동입니다.
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6, marginBottom: 8 }}>
            <button onClick={() => setModeAndJump('core', 'auth-onboarding')} style={{ ...buttonStyle, background: viewMode === 'core' ? '#111827' : '#fff', color: viewMode === 'core' ? '#fff' : '#374151' }}>
              Core만
            </button>
            <button onClick={() => setModeAndJump('core-grid', 'auth-onboarding')} style={{ ...buttonStyle, background: viewMode === 'core-grid' ? '#111827' : '#fff', color: viewMode === 'core-grid' ? '#fff' : '#374151' }}>
              Core+Grid
            </button>
            <button onClick={() => { setViewMode('all'); setTimeout(() => window.__dcResetView?.(), 80); }} style={{ ...buttonStyle, background: viewMode === 'all' ? '#111827' : '#fff', color: viewMode === 'all' ? '#fff' : '#374151' }}>
              전체
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 6, marginBottom: 6 }}>
            <button onClick={() => setModeAndJump('complete', 'core-shell-sm-final')} style={{ ...buttonStyle, background: viewMode === 'complete' ? '#111827' : '#fff', color: viewMode === 'complete' ? '#fff' : '#374151' }}>
              1차 디자인 완료
            </button>
            <button onClick={() => setModeAndJump('complete-1-1', 'core-shell-sm-final-1-1')} style={{ ...buttonStyle, background: viewMode === 'complete-1-1' ? '#111827' : '#fff', color: viewMode === 'complete-1-1' ? '#fff' : '#374151' }}>
              1-1차 디자인 완료
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr 1fr', gap: 6, marginBottom: 10 }}>
            <button onClick={() => setModeAndJump('progress', 'auth-onboarding-sm-final')} style={{ ...buttonStyle, background: viewMode === 'progress' ? '#111827' : '#fff', color: viewMode === 'progress' ? '#fff' : '#374151' }}>
              1차 디자인 진행중
            </button>
            <button onClick={() => setModeAndJump('candidate', 'lessons')} style={{ ...buttonStyle, background: viewMode === 'candidate' ? '#111827' : '#fff', color: viewMode === 'candidate' ? '#fff' : '#374151' }}>
              후보만
            </button>
            <button onClick={() => setModeAndJump('reference', 'toss-dna')} style={{ ...buttonStyle, background: viewMode === 'reference' ? '#111827' : '#fff', color: viewMode === 'reference' ? '#fff' : '#374151' }}>
              기준만
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 10 }}>
            <button onClick={() => setTab('core')} style={tabStyle('core')}>Core</button>
            <button onClick={() => setTab('candidate')} style={tabStyle('candidate')}>Cand.</button>
            <button onClick={() => setTab('grid')} style={tabStyle('grid')}>Grid</button>
            <button onClick={() => setTab('reference')} style={tabStyle('reference')}>Ref.</button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, maxHeight: '58vh', overflow: 'auto', paddingRight: 2 }}>
            {active.map(([sectionId, label]) => (
              <button key={sectionId} onClick={() => onJump(sectionId)} style={{ ...buttonStyle, minHeight: 34, textAlign: 'left', padding: '0 9px' }}>
                {label}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
